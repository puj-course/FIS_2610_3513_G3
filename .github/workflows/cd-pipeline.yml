name: CD EntregaYa – Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: Calcular versión una sola vez y compartirla ──────────────────────
  setup:
    name: Calcular versión
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Calcular versión del proyecto
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$SHORT_SHA" >> $GITHUB_OUTPUT

  # ── Job 2: Compilar y ejecutar pruebas ──────────────────────────────────────
  build-and-test:
    name: Compilar proyecto y pruebas
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # verify en lugar de package: ejecuta tests + JaCoCo + checks de cobertura
      - name: Compilar y verificar cobertura
        run: mvn clean verify

      - name: Verificar que el .jar existe
        run: ls target/*.jar

      - name: Guardar .jar como artefacto del pipeline
        uses: actions/upload-artifact@v4
        with:
          name: entregaya-jar
          path: target/*.jar
          retention-days: 1

      - name: Notificar fallo en Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *CD EntregaYa – Fallo en Build/Tests*
          
          *Repositorio:* ${{ github.repository }}
          *Job:* Compilar proyecto y pruebas
          *Rama:* \`${{ github.ref_name }}\`
          *Commit:* \`${{ github.sha }}\`
          *Autor:* ${{ github.actor }}
          
          [Ver detalle del fallo](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

  # ── Job 3: Construir imagen Docker y publicar en DockerHub ──────────────────
  docker-build-push:
    name: Construir y publicar imagen Docker
    runs-on: ubuntu-22.04
    needs: [setup, build-and-test]

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/entregaya:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/entregaya:${{ needs.setup.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumen del despliegue
        run: |
          echo "## ✅ Imagen publicada en DockerHub" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Imagen** | \`${{ secrets.DOCKERHUB_USERNAME }}/entregaya\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag versión** | \`${{ needs.setup.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag latest** | \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Autor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Para ejecutar la imagen:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/entregaya:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 8081:8081 ${{ secrets.DOCKERHUB_USERNAME }}/entregaya:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Notificar fallo en Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *CD EntregaYa – Fallo al publicar imagen Docker*
          
          *Repositorio:* ${{ github.repository }}
          *Job:* Construir y publicar imagen Docker
          *Rama:* \`${{ github.ref_name }}\`
          *Commit:* \`${{ github.sha }}\`
          *Autor:* ${{ github.actor }}
          
          [Ver detalle del fallo](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

  # ── Job 4: Crear GitHub Release con el .jar ──────────────────────────────────
  github-release:
    name: Crear GitHub Release
    runs-on: ubuntu-22.04
    needs: [setup, build-and-test]

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      # Reutiliza el .jar ya compilado por build-and-test, sin recompilar
      - name: Descargar artefacto .jar
        uses: actions/download-artifact@v4
        with:
          name: entregaya-jar
          path: target/

      - name: Crear GitHub Release y subir .jar
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          name: "Release ${{ needs.setup.outputs.tag }}"
          body: |
            Despliegue automático generado por merge a `main`.

            **Commit:** ${{ github.sha }}
            **Autor:** ${{ github.actor }}

            ### Imagen Docker
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/entregaya:latest
            ```
          files: target/*.jar
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notificar fallo en Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *CD EntregaYa – Fallo al crear GitHub Release*
          
          *Repositorio:* ${{ github.repository }}
          *Job:* Crear GitHub Release
          *Rama:* \`${{ github.ref_name }}\`
          *Commit:* \`${{ github.sha }}\`
          *Autor:* ${{ github.actor }}
          
          [Ver detalle del fallo](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

  # ── Job 5: Notificación de éxito en Telegram ────────────────────────────────
  notify-success:
    name: Notificar éxito en Telegram
    runs-on: ubuntu-22.04
    needs: [setup, docker-build-push, github-release]
    if: success()

    steps:
      - name: Enviar notificación de éxito
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *CD EntregaYa – Despliegue exitoso*
          
          *Repositorio:* ${{ github.repository }}
          *Versión:* \`${{ needs.setup.outputs.tag }}\`
          *Rama:* \`${{ github.ref_name }}\`
          *Commit:* \`${{ github.sha }}\`
          *Autor:* ${{ github.actor }}
          
          🐳 Imagen disponible en DockerHub:
          \`docker pull ${{ secrets.DOCKERHUB_USERNAME }}/entregaya:latest\`
          
          [Ver pipeline](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
