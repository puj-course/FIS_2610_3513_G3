name: CD EntregaYa – Docker

on:
  push:
    branches: [main]
  workflow_dispatch:



jobs:
  # ── Job 1: Calcular versión una sola vez y compartirla ──────────────────────
  setup:
    name: Calcular versión
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Calcular versión del proyecto
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$SHORT_SHA" >> $GITHUB_OUTPUT

  # ── Job 2: Compilar y ejecutar pruebas ──────────────────────────────────────
  build-and-test:
    name: Compilar proyecto y pruebas
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y verificar cobertura
        run: mvn clean verify

      - name: Verificar que el .jar existe
        run: ls target/*.jar

      - name: Guardar .jar como artefacto del pipeline
        uses: actions/upload-artifact@v4
        with:
          name: entregaya-jar
          path: target/*.jar
          retention-days: 1

      - name: Notificar fallo en Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="❌ *CD EntregaYa – Fallo en Build/Tests*
          *Repositorio:* ${{ github.repository }}
          *Job:* Compilar proyecto y pruebas
          *Rama:* \`${{ github.ref_name }}\`
          *Commit:* \`${{ github.sha }}\`
          *Autor:* ${{ github.actor }}
          [Ver detalle del fallo](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

  # ── Job 3: Construir imagen Docker y publicar en DockerHub ──────────────────
  docker-build-push:
    name: Construir y publicar imagen Docker
    runs-on: ubuntu-22.04
    needs: [setup, build-and-test]

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      # FIX: SHA completo en lugar de @v3 (evita supply-chain attacks)
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12c2d7f4d2d5a # v3.6.0

      # FIX: SHA completo en lugar de @v3
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      # FIX: SHA completo en lugar de @v3
      - name: Login en DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # FIX: SHA completo en lugar de @v5
      - name: Construir y publicar imagen
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/entregaya:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/entregaya:${{ needs.setup.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # FIX: DOCKERHUB_USERNAME expuesto como env var, no expandido directamente en el string
      - name: Resumen del despliegue
        env:
          DOCKER_IMAGE_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DEPLOY_TAG: ${{ needs.setup.outputs.tag }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "## ✅ Imagen publicada en DockerHub" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Imagen** | \`${DOCKER_IMAGE_USER}/entregaya\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag versión** | \`${DEPLOY_TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag latest** | \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${COMMIT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Autor** | ${ACTOR} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Para ejecutar la imagen:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${DOCKER_IMAGE_USER}/entregaya:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 8081:8081 ${DOCKER_IMAGE_USER}/entregaya:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Notificar fallo en Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="❌ *CD EntregaYa – Fallo al publicar imagen Docker*

          *Repositorio:* ${{ github.repository }}
          *Job:* Construir y publicar imagen Docker
          *Rama:* \`${{ github.ref_name }}\`
          *Commit:* \`${{ github.sha }}\`
          *Autor:* ${{ github.actor }}

          [Ver detalle del fallo](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

  # ── Job 4: Crear GitHub Release con el .jar ──────────────────────────────────
  github-release:
    name: Crear GitHub Release
    runs-on: ubuntu-22.04
    needs: [setup, build-and-test]
    permissions:
      contents: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Descargar artefacto .jar
        uses: actions/download-artifact@v4
        with:
          name: entregaya-jar
          path: target/

      # FIX: SHA completo en lugar de @v2
      - name: Crear GitHub Release y subir .jar
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          name: "Release ${{ needs.setup.outputs.tag }}"
          body: |
            Despliegue automático generado por merge a `main`.

            **Commit:** ${{ github.sha }}
            **Autor:** ${{ github.actor }}

            ### Imagen Docker
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/entregaya:latest
            ```
          files: target/*.jar
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notificar fallo en Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="❌ *CD EntregaYa – Fallo al crear GitHub Release*
          *Repositorio:* ${{ github.repository }}
          *Job:* Crear GitHub Release
          *Rama:* \`${{ github.ref_name }}\`
          *Commit:* \`${{ github.sha }}\`
          *Autor:* ${{ github.actor }}
          [Ver detalle del fallo](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

  # ── Job 5: Notificación de éxito en Telegram ────────────────────────────────
  notify-success:
    name: Notificar éxito en Telegram
    runs-on: ubuntu-22.04
    needs: [setup, docker-build-push, github-release]
    if: success()

    steps:
      # FIX: DOCKERHUB_USERNAME como env var, no expandido en el string
      - name: Enviar notificación de éxito
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOCKER_IMAGE_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DEPLOY_TAG: ${{ needs.setup.outputs.tag }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="✅ *CD EntregaYa – Despliegue exitoso*

          *Repositorio:* ${{ github.repository }}
          *Versión:* \`${DEPLOY_TAG}\`
          *Rama:* \`${{ github.ref_name }}\`
          *Commit:* \`${{ github.sha }}\`
          *Autor:* ${{ github.actor }}

          🐳 Imagen disponible en DockerHub:
          \`docker pull ${DOCKER_IMAGE_USER}/entregaya:latest\`

          [Ver pipeline](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"