name: CI - Pruebas y Cobertura

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  
  # STAGE 1: Compilación
    build:
    name: "Stage 1 - Compilación"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto
        run: mvn compile --no-transfer-progress

  
  # STAGE 2: Pruebas Unitarias
   test:
    name: "Stage 2 - Pruebas Unitarias"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Crear configuración de pruebas
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/application-test.properties << 'PROPS'
          spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          spring.datasource.driver-class-name=org.h2.Driver
          spring.datasource.username=sa
          spring.datasource.password=
          spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
          spring.jpa.hibernate.ddl-auto=create-drop
          spring.security.user.name=test
          spring.security.user.password=test
          telegram.bot.token=dummy
          telegram.bot.chat-id=dummy
          PROPS

      - name: Ejecutar pruebas
        run: |
          mvn test \
            -Dspring.profiles.active=test \
            --no-transfer-progress \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Generar reporte HTML del plan de pruebas
        if: always()
        run: python3 .github/scripts/generar_reporte.py

      - name: Subir reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: informe-pruebas-html
          path: target/surefire-reports/
          retention-days: 30

 
  # STAGE 3: Cobertura de Código (JaCoCo)
    coverage:
    name: "Stage 3 - Cobertura (JaCoCo)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Crear configuración de pruebas
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/application-test.properties << 'PROPS'
          spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          spring.datasource.driver-class-name=org.h2.Driver
          spring.datasource.username=sa
          spring.datasource.password=
          spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
          spring.jpa.hibernate.ddl-auto=create-drop
          spring.security.user.name=test
          spring.security.user.password=test
          telegram.bot.token=dummy
          telegram.bot.chat-id=dummy
          PROPS

      - name: Ejecutar pruebas con cobertura JaCoCo
        run: |
          mvn verify \
            -Dspring.profiles.active=test \
            --no-transfer-progress \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Verificar umbral de cobertura
        run: |
          mvn jacoco:check \
            --no-transfer-progress \
            || echo "⚠️ Cobertura por debajo del umbral mínimo"

      - name: Subir reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30


  # STAGE 4: Análisis Estático (Checkstyle)
   static-analysis:
    name: "Stage 4 - Análisis Estático Checkstyle"
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar Checkstyle
        run: mvn checkstyle:check --no-transfer-progress || echo "⚠️ Checkstyle encontró problemas"

      - name: Subir reporte Checkstyle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
          retention-days: 30