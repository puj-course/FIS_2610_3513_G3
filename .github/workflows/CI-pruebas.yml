name: CI - Pruebas y Cobertura

on:
  push:
    branches: [ main, develop ]

  pull_request:
    branches: [ main, develop ]

  workflow_dispatch:

jobs:

  # STAGE 1: Compilación
  build:
    name: "Stage 1 - Compilación"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto
        run: mvn compile --no-transfer-progress

  # STAGE 2: Pruebas Unitarias
  test:
    name: "Stage 2 - Pruebas Unitarias"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Crear configuración de pruebas
        run: |
          mkdir -p src/test/resources

          cat > src/test/resources/application-test.properties << 'PROPS'
          spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          spring.datasource.driver-class-name=org.h2.Driver
          spring.datasource.username=sa
          spring.datasource.password=
          spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
          spring.jpa.hibernate.ddl-auto=create-drop
          spring.security.user.name=test
          spring.security.user.password=test
          telegram.bot.token=dummy
          telegram.bot.chat-id=dummy
          PROPS

      - name: Ejecutar pruebas
        run: |
          mvn test \
            -Dspring.profiles.active=test \
            --no-transfer-progress \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Generar reporte HTML del plan de pruebas
        if: always()
        run: python3 .github/scripts/generar_reporte.py

      - name: Subir reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: informe-pruebas-html
          path: target/surefire-reports/
          retention-days: 30

  # STAGE 3: Cobertura de Código (JaCoCo)
  coverage:
    name: "Stage 3 - Cobertura (JaCoCo)"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Crear configuración de pruebas
        run: |
          mkdir -p src/test/resources

          cat > src/test/resources/application-test.properties << 'PROPS'
          spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          spring.datasource.driver-class-name=org.h2.Driver
          spring.datasource.username=sa
          spring.datasource.password=
          spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
          spring.jpa.hibernate.ddl-auto=create-drop
          spring.security.user.name=test
          spring.security.user.password=test
          telegram.bot.token=dummy
          telegram.bot.chat-id=dummy
          PROPS

      - name: Ejecutar pruebas con cobertura JaCoCo
        run: |
          mvn verify \
            -Dspring.profiles.active=test \
            --no-transfer-progress \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Verificar umbral de cobertura (FALLA SI <70%)
        run: mvn jacoco:check --no-transfer-progress

      - name: Subir reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

  # STAGE 4: Análisis Estático (Checkstyle)
  static-analysis:
    name: "Stage 4 - Análisis Estático Checkstyle"
    runs-on: ubuntu-latest
    needs: coverage

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar Checkstyle
        run: |
          mvn checkstyle:check \
            --no-transfer-progress \
            || echo "⚠️ Checkstyle encontró problemas"

      - name: Subir reporte Checkstyle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
          retention-days: 30

  # STAGE 5: SonarQube Quality Gate
  sonarqube:
    name: "Stage 5 - SonarQube Quality Gate"
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Crear configuración de pruebas
        run: |
          mkdir -p src/test/resources

          cat > src/test/resources/application-test.properties << 'PROPS'
          spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          spring.datasource.driver-class-name=org.h2.Driver
          spring.datasource.username=sa
          spring.datasource.password=
          spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
          spring.jpa.hibernate.ddl-auto=create-drop
          spring.security.user.name=test
          spring.security.user.password=test
          telegram.bot.token=dummy
          telegram.bot.chat-id=dummy
          PROPS

      - name: Ejecutar análisis de SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=puj-course_FIS_2610_3513_G3 \
            -Dsonar.organization=puj-course \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dspring.profiles.active=test \
            --no-transfer-progress \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Esperar resultado del Quality Gate
        run: sleep 10

      - name: Consultar Quality Gate y bloquear si falla
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PROJECT_KEY="puj-course_FIS_2610_3513_G3"

          QG_STATUS=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$PROJECT_KEY" \
            | grep -o '"status":"[^"]*"' | cut -d'"' -f4)

          echo "📊 Quality Gate Status: $QG_STATUS"

          if [ "$QG_STATUS" != "OK" ]; then
            echo "❌ Quality Gate FAILED - Bloqueando pipeline"
            echo "🔗 Ver detalles en: https://sonarcloud.io/dashboard?id=$PROJECT_KEY"
            exit 1
          else
            echo "✅ Quality Gate PASSED"
          fi

      - name: Subir badge de SonarQube
        if: always()
        run: |
          echo "## 📊 SonarCloud Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "[![Quality Gate Status](https://sonarcloud.io/api/project_badges/measure?project=puj-course_FIS_2610_3513_G3&metric=alert_status)](https://sonarcloud.io/dashboard?id=puj-course_FIS_2610_3513_G3)" >> $GITHUB_STEP_SUMMARY
