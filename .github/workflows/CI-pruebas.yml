name: CI - EntregaYa

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:

  # STAGE 1 — Compilación
  build:
    name: Compilación
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compilar proyecto
        run: mvn compile

  # STAGE 2 — Pruebas Unitarias
  test:
    name: Pruebas Unitarias
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Ejecutar pruebas
        run: mvn test
      - name: Subir reporte de pruebas
        uses: actions/upload-artifact@v4
        with:
          name: informe-pruebas-html
          path: target/surefire-reports/
          retention-days: 30

  # STAGE 3 — Cobertura
  coverage:
    name: Cobertura JaCoCo
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Ejecutar cobertura
        run: mvn verify
      - name: Subir reporte HTML
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

  # STAGE 4 — Análisis Estático
  static-analysis:
    name: Análisis Estático Checkstyle
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Ejecutar Checkstyle
        run: mvn checkstyle:check
      - name: Subir reporte Checkstyle
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
          retention-days: 30

  # STAGE 5 — SonarQube
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Analizar con SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
