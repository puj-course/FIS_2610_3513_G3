name: Reporte General Metodología Ágil

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  reporte-general:
    runs-on: ubuntu-22.04

    steps:

      # Clonar repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # Crear carpeta de reportes
      - name: Crear carpeta reporte
        run: mkdir -p docs/reporte

      # Obtener issues del repositorio
      - name: Obtener issues
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api --paginate repos/${{ github.repository }}/issues?state=all\&per_page=100 \
            > issues.json

      # Obtener pull requests
      - name: Obtener pull requests
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api --paginate repos/${{ github.repository }}/pulls?state=all\&per_page=100 \
            > prs.json

      # Obtener ramas
      - name: Obtener ramas
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api repos/${{ github.repository }}/branches?per_page=100 \
            > branches.json

      # Obtener milestones
      - name: Obtener milestones
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api repos/${{ github.repository }}/milestones?state=all\&per_page=100 \
            > milestones.json

      # Obtener commits
      - name: Obtener commits
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api --paginate repos/${{ github.repository }}/commits?per_page=100 \
            > commits.json

      # Generar reporte markdown
      - name: Generar reporte
        run: |
          node << 'EOF'

          const fs = require('fs');

          // Leer archivos JSON
          const issues =
            JSON.parse(fs.readFileSync('issues.json'));

          const prs =
            JSON.parse(fs.readFileSync('prs.json'));

          const branches =
            JSON.parse(fs.readFileSync('branches.json'));

          const milestones =
            JSON.parse(fs.readFileSync('milestones.json'));

          const commits =
            JSON.parse(fs.readFileSync('commits.json'));

          // Filtrar issues reales
          const realIssues =
            issues.filter(i => !i.pull_request);

          // Detectar historias de usuario
          const historias =
            realIssues.filter(i => {

              const title =
                i.title.toUpperCase();

              return (
                title.includes('HU-')
                || title.includes('HISTORIA DE USUARIO')
                || /^R\d+/i.test(i.title)
              );

            });

          // Obtener issues cerrados
          const closedIssues =
            realIssues.filter(i =>
              i.state === 'closed'
            );

          // Obtener historias cerradas
          const historiasClosed =
            historias.filter(i =>
              i.state === 'closed'
            );

          // Clasificar pull requests
          const mergedPRs =
            prs.filter(pr => pr.merged_at);

          const openPRs =
            prs.filter(pr =>
              pr.state === 'open'
            );

          const closedPRs =
            prs.filter(pr =>
              pr.state === 'closed'
              && !pr.merged_at
            );

          // Contar commits por usuario
          const contributors = {};

          commits.forEach(c => {

            if (!c.author) return;

            const user =
              c.author.login;

            if (user.includes('[bot]')) return;

            if (!contributors[user]) {
              contributors[user] = 0;
            }

            contributors[user]++;

          });

          // Contar issues por usuario
          const issueStats = {};

          realIssues.forEach(issue => {

            issue.assignees.forEach(a => {

              const user =
                a.login;

              if (!issueStats[user]) {

                issueStats[user] = {
                  assigned: 0,
                  closed: 0
                };

              }

              issueStats[user].assigned++;

              if (issue.state === 'closed') {
                issueStats[user].closed++;
              }

            });

          });

          // Obtener nombres de ramas
          const branchNames =
            branches.map(b => b.name);

          // Detectar ramas principales
          const mainBranches =
            branchNames.filter(b =>
              ['main', 'develop', 'master']
                .includes(b)
            );

          // Detectar feature branches
          const featureBranches =
            branchNames.filter(b =>
              b.startsWith('feature/')
            );

          // Detectar ramas personales
          const personalBranches =
            branchNames.filter(b =>

              !['main', 'develop', 'master']
                .includes(b)
              && !b.startsWith('feature/')

            );

          // Obtener fecha actual
          const fecha =
            new Date().toISOString().split('T')[0];

          // Crear markdown
          let reporte =
            `# Reporte General de Metodología Ágil\n\n`;

          reporte +=
            `Fecha generación: ${fecha}\n\n`;

          reporte +=
            `---\n\n`;

          // Sección de issues
          reporte +=
            `# 1. Issues del Proyecto\n\n`;

          reporte +=
            `| Métrica | Valor |\n`;

          reporte +=
            `|----------|-------|\n`;

          reporte +=
            `| Total Issues | ${realIssues.length} |\n`;

          reporte +=
            `| Issues Cerrados | ${closedIssues.length} |\n`;

          reporte +=
            `| Issues Abiertos | ${realIssues.length - closedIssues.length} |\n\n`;

          // Sección de historias
          reporte +=
            `# 2. Historias de Usuario\n\n`;

          reporte +=
            `| Métrica | Valor |\n`;

          reporte +=
            `|----------|-------|\n`;

          reporte +=
            `| Total Historias | ${historias.length} |\n`;

          reporte +=
            `| Historias Cerradas | ${historiasClosed.length} |\n`;

          reporte +=
            `| Historias Abiertas | ${historias.length - historiasClosed.length} |\n\n`;

          // Tabla de historias
          reporte +=
            `## Historias Detectadas\n\n`;

          reporte +=
            `| Historia | Estado |\n`;

          reporte +=
            `|-----------|--------|\n`;

          historias.forEach(h => {

            reporte +=
              `| #${h.number} ${h.title} | ${h.state} |\n`;

          });

          reporte += '\n';

          // Sección pull requests
          reporte +=
            `# 3. Pull Requests\n\n`;

          reporte +=
            `| Métrica | Valor |\n`;

          reporte +=
            `|----------|-------|\n`;

          reporte +=
            `| Total PRs | ${prs.length} |\n`;

          reporte +=
            `| PRs Mergeados | ${mergedPRs.length} |\n`;

          reporte +=
            `| PRs Abiertos | ${openPRs.length} |\n`;

          reporte +=
            `| PRs Cerrados sin Merge | ${closedPRs.length} |\n\n`;

          // Sección commits
          reporte +=
            `# 4. Participación por Commits\n\n`;

          reporte +=
            `| Usuario | Commits |\n`;

          reporte +=
            `|----------|----------|\n`;

          Object.entries(contributors)
            .sort((a,b) => b[1] - a[1])
            .forEach(([user, total]) => {

              reporte +=
                `| @${user} | ${total} |\n`;

            });

          reporte += '\n';

          // Sección issues por usuario
          reporte +=
            `# 5. Participación por Issues\n\n`;

          reporte +=
            `| Usuario | Asignados | Cerrados |\n`;

          reporte +=
            `|----------|------------|-----------|\n`;

          Object.entries(issueStats)
            .sort((a,b) =>
              b[1].assigned - a[1].assigned
            )
            .forEach(([user, stats]) => {

              reporte +=
                `| @${user} | ${stats.assigned} | ${stats.closed} |\n`;

            });

          reporte += '\n';

          // Sección milestones
          reporte +=
            `# 6. Milestones\n\n`;

          reporte +=
            `| Milestone | Estado | Issues Abiertos | Issues Cerrados |\n`;

          reporte +=
            `|------------|---------|------------------|------------------|\n`;

          milestones.forEach(m => {

            reporte +=
              `| ${m.title} | ${m.state} | ${m.open_issues} | ${m.closed_issues} |\n`;

          });

          reporte += '\n';

          // Sección ramas
          reporte +=
            `# 7. Estructura de Ramas\n\n`;

          reporte +=
            `- Total ramas: ${branchNames.length}\n`;

          reporte +=
            `- Ramas principales: ${mainBranches.length}\n`;

          reporte +=
            `- Feature branches: ${featureBranches.length}\n`;

          reporte +=
            `- Ramas personales: ${personalBranches.length}\n\n`;

          // Tabla ramas principales
          reporte +=
            `## Ramas Principales\n\n`;

          reporte +=
            `| Rama |\n`;

          reporte +=
            `|------|\n`;

          mainBranches.forEach(b => {

            reporte +=
              `| ${b} |\n`;

          });

          reporte += '\n';

          // Tabla feature branches
          reporte +=
            `## Feature Branches\n\n`;

          reporte +=
            `| Rama |\n`;

          reporte +=
            `|------|\n`;

          featureBranches.slice(0, 20)
            .forEach(b => {

              reporte +=
                `| ${b} |\n`;

            });

          reporte += '\n';

          // Guardar archivo markdown
          fs.writeFileSync(
            'docs/reporte/reporte-general-metodologia.md',
            reporte
          );

          console.log(
            'Reporte generado correctamente'
          );

          EOF

      # Mostrar resumen del workflow
      - name: Mostrar resumen
        run: |
          echo "## Reporte generado correctamente" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Archivo generado:" >> $GITHUB_STEP_SUMMARY
          echo "\`docs/reporte/reporte-general-metodologia.md\`" >> $GITHUB_STEP_SUMMARY

      # Subir cambios al repositorio
      - name: Commit y push
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/reporte/

          if git diff --staged --quiet; then
            echo "No hay cambios"
          else
            git commit -m "docs: actualizar reporte metodologia agil [skip ci]"
            git push
          fi