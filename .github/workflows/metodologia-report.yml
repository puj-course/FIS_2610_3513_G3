name: Reporte Metodología Ágil

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agile-report:
    runs-on: ubuntu-22.04

    steps:

      # Clonar repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # Crear carpeta de reportes
      - name: Crear carpeta reportes
        run: mkdir -p docs/reporte

      # Obtener issues del repositorio
      - name: Obtener issues
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api --paginate repos/${{ github.repository }}/issues?state=all\&per_page=100 \
            > issues.json

      # Obtener pull requests
      - name: Obtener PRs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api --paginate repos/${{ github.repository }}/pulls?state=all\&per_page=100 \
            > prs.json

      # Obtener ramas
      - name: Obtener ramas
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api --paginate repos/${{ github.repository }}/branches?per_page=100 \
            > branches.json

      # Obtener milestones
      - name: Obtener milestones
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api repos/${{ github.repository }}/milestones?state=all\&per_page=100 \
            > milestones.json

      # Obtener contributors
      - name: Obtener contributors
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api repos/${{ github.repository }}/contributors?per_page=100 \
            > contributors.json

      # Generar reporte
      - name: Generar reporte
        run: |

          node << 'EOF'

          const fs = require('fs');

          // Leer JSON
          const issues = JSON.parse(fs.readFileSync('issues.json'));
          const prs = JSON.parse(fs.readFileSync('prs.json'));
          const branches = JSON.parse(fs.readFileSync('branches.json'));
          const milestones = JSON.parse(fs.readFileSync('milestones.json'));
          const contributors = JSON.parse(fs.readFileSync('contributors.json'));

          // Detectar historias reales
          function esHistoriaUsuario(title) {

            if (!title) return false;

            const upper = title.toUpperCase();

            // Excluir diagramas/documentación
            const excluidos = [
              'DIAGRAMA',
              'DOCUMENTACION',
              'DOCUMENTACIÓN',
              'MANUAL',
              'README',
              'ARQUITECTURA',
              'MODELO',
              'DESPLIEGUE',
              'COMPONENTES',
              'ANALISIS',
              'ANÁLISIS',
              'ECB'
            ];

            for (const palabra of excluidos) {
              if (upper.includes(palabra)) {
                return false;
              }
            }

            // Detectar HU reales
            return (
              /^HU[- ]?\d+/i.test(title) ||
              /^Historia de Usuario/i.test(title) ||
              /^R\d+/i.test(title)
            );
          }

          // Filtrar solo issues reales
          const onlyIssues = issues.filter(i => !i.pull_request);

          // Historias de usuario
          const hu = onlyIssues.filter(i => esHistoriaUsuario(i.title));

          // Métricas generales
          const closedIssues = onlyIssues.filter(i => i.state === 'closed');
          const openIssues = onlyIssues.filter(i => i.state === 'open');

          const huClosed = hu.filter(i => i.state === 'closed');
          const huOpen = hu.filter(i => i.state === 'open');

          // Pull requests
          const mergedPRs = prs.filter(pr => pr.merged_at);
          const openPRs = prs.filter(pr => pr.state === 'open');
          const closedPRs = prs.filter(pr =>
            pr.state === 'closed' && !pr.merged_at
          );

          // Contributors
          const contributorsFiltered = contributors.filter(c =>
            !c.login.includes('[bot]')
          );

          // Ramas
          const branchNames = branches.map(b => b.name);

          const mainBranches = branchNames.filter(b =>
            ['main', 'develop', 'master'].includes(b)
          );

          const featureBranches = branchNames.filter(b =>
            b.startsWith('feature/')
          );

          const personalBranches = branchNames.filter(b =>
            !['main', 'develop', 'master'].includes(b)
            && !b.startsWith('feature/')
          );

          // Issues por usuario
          const userStats = {};

          onlyIssues.forEach(issue => {

            if (!issue.assignees) return;

            issue.assignees.forEach(user => {

              if (!userStats[user.login]) {
                userStats[user.login] = {
                  assigned: 0,
                  closed: 0
                };
              }

              userStats[user.login].assigned++;

              if (issue.state === 'closed') {
                userStats[user.login].closed++;
              }

            });

          });

          // Fecha
          const fecha = new Date().toISOString().split('T')[0];

          // Crear markdown
          let reporte = `# Reporte General de Metodología Ágil\n\n`;

          reporte += `Fecha generación: ${fecha}\n\n`;

          reporte += `---\n\n`;

          // Resumen general
          reporte += `# 1. Resumen General\n\n`;

          reporte += `| Métrica | Valor |\n`;
          reporte += `|----------|--------|\n`;
          reporte += `| Total Issues | ${onlyIssues.length} |\n`;
          reporte += `| Issues Cerrados | ${closedIssues.length} |\n`;
          reporte += `| Issues Abiertos | ${openIssues.length} |\n`;
          reporte += `| Historias de Usuario | ${hu.length} |\n`;
          reporte += `| HU Cerradas | ${huClosed.length} |\n`;
          reporte += `| HU Abiertas | ${huOpen.length} |\n`;
          reporte += `| Pull Requests | ${prs.length} |\n`;
          reporte += `| PRs Mergeados | ${mergedPRs.length} |\n`;
          reporte += `| Contributors | ${contributorsFiltered.length} |\n`;
          reporte += `| Milestones | ${milestones.length} |\n\n`;

          // Historias de usuario
          reporte += `# 2. Historias de Usuario\n\n`;

          reporte += `| Issue | Estado |\n`;
          reporte += `|--------|--------|\n`;

          hu
            .sort((a, b) => a.number - b.number)
            .forEach(issue => {

              reporte += `| #${issue.number} ${issue.title} | ${issue.state} |\n`;

            });

          reporte += `\n`;

          // Pull requests
          reporte += `# 3. Pull Requests\n\n`;

          reporte += `| Métrica | Valor |\n`;
          reporte += `|----------|--------|\n`;
          reporte += `| Total PRs | ${prs.length} |\n`;
          reporte += `| Mergeados | ${mergedPRs.length} |\n`;
          reporte += `| Abiertos | ${openPRs.length} |\n`;
          reporte += `| Cerrados sin merge | ${closedPRs.length} |\n\n`;

          // Contributors
          reporte += `# 4. Participación del Equipo\n\n`;

          reporte += `| Usuario | Commits |\n`;
          reporte += `|----------|----------|\n`;

          contributorsFiltered.forEach(c => {

            reporte += `| @${c.login} | ${c.contributions} |\n`;

          });

          reporte += `\n`;

          // Issues por integrante
          reporte += `# 5. Issues por Integrante\n\n`;

          reporte += `| Usuario | Asignados | Cerrados |\n`;
          reporte += `|----------|------------|------------|\n`;

          Object.entries(userStats)
            .sort((a, b) => b[1].assigned - a[1].assigned)
            .forEach(([user, stats]) => {

              reporte += `| @${user} | ${stats.assigned} | ${stats.closed} |\n`;

            });

          reporte += `\n`;

          // Milestones
          reporte += `# 6. Milestones\n\n`;

          if (milestones.length > 0) {

            reporte += `| Milestone | Estado |\n`;
            reporte += `|------------|---------|\n`;

            milestones.forEach(m => {

              reporte += `| ${m.title} | ${m.state} |\n`;

            });

          } else {

            reporte += `No existen milestones.\n`;

          }

          reporte += `\n`;

          // Ramas
          reporte += `# 7. Estructura de Ramas\n\n`;

          reporte += `## Resumen\n\n`;

          reporte += `- Total ramas: ${branchNames.length}\n`;
          reporte += `- Ramas principales: ${mainBranches.length}\n`;
          reporte += `- Feature branches: ${featureBranches.length}\n`;
          reporte += `- Ramas personales: ${personalBranches.length}\n\n`;

          // Ramas principales
          reporte += `## Ramas Principales\n\n`;

          reporte += `| Rama |\n`;
          reporte += `|------|\n`;

          mainBranches.forEach(b => {

            reporte += `| ${b} |\n`;

          });

          reporte += `\n`;

          // Feature branches
          reporte += `## Feature Branches\n\n`;

          reporte += `| Rama |\n`;
          reporte += `|------|\n`;

          featureBranches.forEach(b => {

            reporte += `| ${b} |\n`;

          });

          reporte += `\n`;

          // Ramas personales
          reporte += `## Ramas Personales\n\n`;

          reporte += `| Rama |\n`;
          reporte += `|------|\n`;

          personalBranches.forEach(b => {

            reporte += `| ${b} |\n`;

          });

          reporte += `\n`;

          // Guardar reporte
          fs.writeFileSync(
            'docs/reporte/reporte-metodologia-agil.md',
            reporte
          );

          console.log('Reporte generado correctamente');

          EOF

      # Mostrar resumen
      - name: Mostrar resumen
        run: |
          echo "## Reporte generado correctamente" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Archivo generado:" >> $GITHUB_STEP_SUMMARY
          echo "\`docs/reporte/reporte-metodologia-agil.md\`" >> $GITHUB_STEP_SUMMARY

      # Commit automático
      - name: Commit y push
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/reporte/

          if git diff --staged --quiet; then
            echo "No hay cambios"
          else
            git commit -m "docs: actualizar reporte metodologia agil [skip ci]"
            git push
          fi