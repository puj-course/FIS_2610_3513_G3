name: CI Pruebas Unitarias

# Gitflow: se ejecuta en pushes a ramas principales/feature y en PRs hacia develop y main
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
  MAVEN_OPTS: "-Dfile.encoding=UTF-8"

jobs:
  test:
    name: Ejecutar pruebas unitarias y generar reporte
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Elimina TODOS los bytes no-ASCII del archivo (sin importar la codificación
      # original). Solo modifica la copia del runner, NO el repositorio.
      - name: Sanitizar application.properties (solo en el runner)
        run: |
          FILE=src/main/resources/application.properties
          if [ -f "$FILE" ]; then
            echo "=== Antes de sanitizar ==="
            cat "$FILE" || true
            LC_ALL=C tr -cd '\11\12\15\40-\176' < "$FILE" > "${FILE}.tmp"
            mv "${FILE}.tmp" "$FILE"
            echo "=== Despues de sanitizar ==="
            cat "$FILE"
          fi

      - name: Compilar el proyecto
        run: mvn -B compile -Dproject.build.sourceEncoding=UTF-8

      - name: Ejecutar pruebas unitarias
        run: mvn -B test -Dproject.build.sourceEncoding=UTF-8

      - name: Generar reporte HTML de pruebas (Surefire)
        if: always()
        continue-on-error: true
        run: mvn -B surefire-report:report-only

      - name: Publicar resumen de resultados en la UI de GitHub
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Resultados JUnit 5
          path: 'target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Subir reporte HTML como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas-html
          path: |
            target/site/
            target/reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Subir reportes XML de Surefire como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas-xml
          path: target/surefire-reports/
          retention-days: 30
