name: CI Pruebas Unitarias

# Gitflow: se ejecuta en pushes a ramas principales/feature y en PRs hacia develop y main
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

# Forzar codificación UTF-8 para evitar errores con caracteres especiales
env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  MAVEN_OPTS: "-Dfile.encoding=UTF-8"

jobs:
  test:
    name: Ejecutar pruebas unitarias y generar reporte
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar el proyecto
        run: mvn -B compile -Dfile.encoding=UTF-8 -Dproject.build.sourceEncoding=UTF-8

      - name: Ejecutar pruebas unitarias
        run: mvn -B test -Dfile.encoding=UTF-8 -Dproject.build.sourceEncoding=UTF-8

      - name: Generar reporte HTML de pruebas (Surefire)
        if: always()
        continue-on-error: true
        run: mvn -B surefire-report:report-only -Dfile.encoding=UTF-8

      - name: Publicar resumen de resultados en la UI de GitHub
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Resultados JUnit 5
          path: 'target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Subir reporte HTML como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas-html
          path: |
            target/site/
            target/reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Subir reportes XML de Surefire como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas-xml
          path: target/surefire-reports/
          retention-days: 30
