name: Sprint Report (Docs)

on:
  schedule:
    # Sábado 12:00 PM Colombia (UTC-5 - 17:00 UTC)
    - cron: '0 17 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-22.04

    steps:
      # Clonar repo
      - name: Checkout
        uses: actions/checkout@v4

      # Crear carpeta si no existe
      - name: Crear carpeta docs/reporte
        run: mkdir -p docs/reporte

      # Obtener datos del project usando GH_PAT
      - name: Obtener datos del Project (GraphQL)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api graphql -f query='
            query($org: String!, $num: Int!) {
              organization(login: $org) {
                projectV2(number: $num) {
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          number
                          title
                          state
                          assignees(first: 5) {
                            nodes { login }
                          }
                        }
                      }
                      fieldValues(first: 10) {
                        nodes {
                          ... on ProjectV2ItemFieldIterationValue {
                            title
                            startDate
                            duration
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          ' \
          -f org="puj-course" \
          -F num=61 \
          > data.json

      # Procesar JSON y generar reporte
      - name: Generar reporte
        run: |
          node << 'EOF'
          const fs = require('fs');

          const data = JSON.parse(fs.readFileSync('data.json', 'utf8'));
          const items = data.data.organization.projectV2.items.nodes;

          let currentSprint = null;
          let latestSprint = null;
          const today = new Date();

          // Detectar sprint
          for (const item of items) {
            const iteration = item.fieldValues.nodes.find(f => f.title);

            if (!iteration || !iteration.startDate) continue;

            const start = new Date(iteration.startDate);

            if (!latestSprint || start > latestSprint.date) {
              latestSprint = { name: iteration.title, date: start };
            }

            const end = new Date(start);
            end.setDate(start.getDate() + iteration.duration);

            if (today >= start && today <= end) {
              currentSprint = iteration.title;
            }
          }
          
          const SPRINT_NAME = currentSprint || (latestSprint ? latestSprint.name : "sprint");

          console.log("Sprint detectado:", SPRINT_NAME);

          const fileName = `docs/reporte/report-${SPRINT_NAME.replace(" ", "-").toLowerCase()}.md`;
          
          let completados = [];
          let pendientes = [];
          let historias = [];
          let usuarios = {};

          // Procesar issues
          for (const item of items) {

            const issue = item.content;
            if (!issue) continue;

            const iteration = item.fieldValues.nodes.find(f => f.title);
            if (!iteration || iteration.title !== SPRINT_NAME) continue;

            const asignados = issue.assignees.nodes.map(a => a.login);

            for (const user of asignados) {
              if (!usuarios[user]) {
                usuarios[user] = { asignados: 0, completados: 0, pendientes: 0 };
              }
              usuarios[user].asignados++;
            }

            const info = `#${issue.number} ${issue.title}`;

            // detectar HU
            if (issue.title.toUpperCase().startsWith("HU-")) {
              historias.push(info);
            }

            if (issue.state === "CLOSED") {
              completados.push(info);
              asignados.forEach(u => usuarios[u].completados++);
            } else {
              pendientes.push(info);
              asignados.forEach(u => usuarios[u].pendientes++);
            }
          }

          const total = completados.length + pendientes.length;
          const porcentaje = total > 0 ? ((completados.length / total) * 100).toFixed(2) : 0;

          // Crear reporte
          let reporte = `# Reporte ${SPRINT_NAME}\n\n`;

          reporte += `## Resumen\n`;
          reporte += `- Total: ${total}\n`;
          reporte += `- Completados: ${completados.length}\n`;
          reporte += `- Pendientes: ${pendientes.length}\n`;
          reporte += `- Cumplimiento: ${porcentaje}%\n\n`;

          reporte += `## Historias de usuario\n`;
          reporte += historias.length ? historias.join("\n") : "Ninguna";
          reporte += "\n\n";

          reporte += `## Issues completados\n`;
          reporte += completados.length ? completados.join("\n") : "Ninguno";
          reporte += "\n\n";

          reporte += `## Issues pendientes\n`;
          reporte += pendientes.length ? pendientes.join("\n") : "Ninguno";
          reporte += "\n\n";

          reporte += `## Métricas por usuario\n\n`;

          for (const [user, dataU] of Object.entries(usuarios)) {

            const pct = dataU.asignados > 0
              ? ((dataU.completados / dataU.asignados) * 100).toFixed(2)
              : 0;

            reporte += `### @${user}\n`;
            reporte += `- Asignados: ${dataU.asignados}\n`;
            reporte += `- Completados: ${dataU.completados}\n`;
            reporte += `- Pendientes: ${dataU.pendientes}\n`;
            reporte += `- Cumplimiento: ${pct}%\n\n`;
          }

          fs.writeFileSync(fileName, reporte);
          EOF

      # Commit automatico
      - name: Subir reporte
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add docs/reporte/
          git commit -m "docs: agregar reporte automatico de sprint" || echo "No hay cambios"
          git push
