name: Sprint Report (Docs)

on:
  schedule:
    # Sábado 12:00 PM Colombia (UTC-5 - 17:00 UTC)
    - cron: '0 17 * * 6'
  workflow_dispatch: # permite ejecutarlo manualmente

permissions:
  contents: write  # necesario para hacer commit

jobs:
  report:
    runs-on: ubuntu-22.04

    steps:
      # Descargar el repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # Crear carpeta docs/reporte si no existe
      - name: Crear carpeta de reportes
        run: mkdir -p docs/reporte

      # Generar el reporte usando GraphQL
      - name: Generar reporte de sprint
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // QUERY GRAPHQL
            // Se obtiene info del Project (issues + sprint)
            const query = `
            query($org: String!, $num: Int!) {
              organization(login: $org) {
                projectV2(number: $num) {
                  title
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          number
                          title
                          state
                          assignees(first: 5) {
                            nodes { login }
                          }
                        }
                      }
                      fieldValues(first: 10) {
                        nodes {
                          ... on ProjectV2ItemFieldIterationValue {
                            title
                            startDate
                            duration
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
            `;

            // que busque en el project 61 que es el de nuestro grupo 
            const result = await github.graphql(query, {
              org: "puj-course",
              num: 61
            });

            const items = result.organization.projectV2.items.nodes;

            // detectar el sprint iteration
            let currentSprint = null;
            let latestSprint = null;
            const today = new Date();

            for (const item of items) {

              const iteration = item.fieldValues.nodes.find(f => f.title);

              if (!iteration || !iteration.startDate || !iteration.duration) continue;

              const start = new Date(iteration.startDate);

              // guardar el sprint mas reciente
              if (!latestSprint || start > latestSprint.date) {
                latestSprint = {
                  name: iteration.title,
                  date: start
                };
              }

              const end = new Date(start);
              end.setDate(start.getDate() + iteration.duration);

              // verificar si hoy esta dentro del sprint
              if (today >= start && today <= end) {
                currentSprint = iteration.title;
              }
            }

            // usar sprint activo o fallback al ultimo
            const SPRINT_NAME = currentSprint || (latestSprint ? latestSprint.name : "Sprint desconocido");

            console.log("Sprint detectado:", SPRINT_NAME);

            // nombre del archivo
            const FILE_NAME = `docs/reporte/report-${SPRINT_NAME.replace(" ", "-").toLowerCase()}.md`;

            // variables
            let completados = [];
            let pendientes = [];
            let historias = [];
            let usuarios = {};

            // procesar los issues
            for (const item of items) {

              const issue = item.content;
              if (!issue) continue;

              const iteration = item.fieldValues.nodes.find(f => f.title);

              // solo los issues del sprint detectado
              if (!iteration || iteration.title !== SPRINT_NAME) continue;

              const asignados = issue.assignees.nodes.map(a => a.login);

              // inicializar usuarios
              for (const user of asignados) {
                if (!usuarios[user]) {
                  usuarios[user] = {
                    asignados: 0,
                    completados: 0,
                    pendientes: 0
                  };
                }
                usuarios[user].asignados++;
              }

              const info = `#${issue.number} ${issue.title}`;

              // detectar historias de usuario (por HU-)
              if (issue.title.toUpperCase().startsWith("HU-")) {
                historias.push(info);
              }

              // clasificar estado
              if (issue.state === "CLOSED") {
                completados.push(info);
                asignados.forEach(u => usuarios[u].completados++);
              } else {
                pendientes.push(info);
                asignados.forEach(u => usuarios[u].pendientes++);
              }
            }

            // calculos
            const total = completados.length + pendientes.length;
            const porcentaje = total > 0
              ? ((completados.length / total) * 100).toFixed(2)
              : 0;

            // hacer reporte
            let reporte = `# Reporte ${SPRINT_NAME}\n\n`;

            reporte += `## Resumen\n\n`;
            reporte += `- Total: ${total}\n`;
            reporte += `- Completados: ${completados.length}\n`;
            reporte += `- Pendientes: ${pendientes.length}\n`;
            reporte += `- Cumplimiento: ${porcentaje}%\n\n`;

            reporte += `## Historias de usuario\n\n`;
            reporte += historias.length ? historias.join("\n") : "Ninguna";
            reporte += "\n\n";

            reporte += `## Issues completados\n\n`;
            reporte += completados.length ? completados.join("\n") : "Ninguno";
            reporte += "\n\n";

            reporte += `## Issues pendientes\n\n`;
            reporte += pendientes.length ? pendientes.join("\n") : "Ninguno";
            reporte += "\n\n";

            reporte += `## Métricas por usuario\n\n`;

            for (const [user, data] of Object.entries(usuarios)) {

              const pct = data.asignados > 0
                ? ((data.completados / data.asignados) * 100).toFixed(2)
                : 0;

              reporte += `### @${user}\n`;
              reporte += `- Asignados: ${data.asignados}\n`;
              reporte += `- Completados: ${data.completados}\n`;
              reporte += `- Pendientes: ${data.pendientes}\n`;
              reporte += `- Cumplimiento: ${pct}%\n\n`;
            }

            // ranking
            reporte += `## Ranking de desempeño\n\n`;

            const ranking = Object.entries(usuarios)
              .map(([user, data]) => ({
                user,
                score: data.asignados > 0
                  ? data.completados / data.asignados
                  : 0
              }))
              .sort((a, b) => b.score - a.score);

            ranking.forEach((r, i) => {
              reporte += `${i + 1}. @${r.user} - ${(r.score * 100).toFixed(2)}%\n`;
            });

            reporte += "\n";

            // guardar archivo
            fs.writeFileSync(FILE_NAME, reporte);

      # Subir el archivo al repo
      - name: Commit y push del reporte
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add docs/reporte/
          git commit -m "docs: agregar reporte automático de sprint" || echo "No hay cambios"
          git push
