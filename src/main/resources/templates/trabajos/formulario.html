<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Entrega Ya — Nuevo Trabajo</title>
    <th:block th:replace="~{fragments/form-styles :: formStyles}"></th:block>
</head>
<body>
<header>
    <a th:href="@{/trabajos}" class="brand">ENTREGA <span>YA</span></a>
    <span class="header-sub">Nuevo trabajo</span>
</header>
<div class="container">
    <a th:href="@{/trabajos}" class="back">← Volver</a>
    <div class="card">
        <div class="card-title">Crear nuevo trabajo</div>
        <form th:action="@{/trabajos/nuevo}" th:object="${trabajo}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field">
                <label>Nombre *</label>
                <input type="text" th:field="*{nombreTrabajo}" placeholder="Ej. Informe de Estructuras de Datos" required/>
            </div>
            <div class="field">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}" placeholder="Describe brevemente el trabajo..."></textarea>
            </div>
            <div class="row">
                <div class="field">
                    <label>Fecha inicio</label>
                    <input type="datetime-local" th:field="*{fechaInicio}"/>
                </div>
                <div class="field">
                    <label>Fecha entrega</label>
                    <input type="datetime-local" th:field="*{fechaEntrega}"/>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn-primary">Crear trabajo</button>
                <a th:href="@{/trabajos}" class="btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
