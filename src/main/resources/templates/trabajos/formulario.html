<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Entrega Ya — Nuevo Trabajo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f7f7f5; color: #222; }
        header { background: #1a1a1a; color: #fff; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
        .brand { font-size: 1rem; font-weight: 800; color: #fff; text-decoration: none; }
        .brand span { color: #f4a535; }
        .header-sub { font-size: 0.82rem; color: #888; }
        .container { max-width: 560px; margin: 32px auto; padding: 0 20px; }
        .back { font-size: 0.82rem; color: #888; text-decoration: none; display: inline-block; margin-bottom: 18px; }
        .back:hover { color: #444; }
        .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 28px; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 22px; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        input[type="text"], textarea, input[type="datetime-local"] {
            width: 100%; padding: 10px 12px; border: 1px solid #e5e5e5; border-radius: 6px;
            font-size: 0.9rem; font-family: inherit; outline: none; background: #fafafa;
        }
        input:focus, textarea:focus { border-color: #f4a535; background: #fff; }
        textarea { height: 80px; resize: vertical; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .actions { display: flex; gap: 10px; margin-top: 6px; }
        .btn-primary { padding: 10px 20px; background: #f4a535; color: #fff; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .btn-primary:hover { background: #e0932b; }
        .btn-secondary { padding: 10px 16px; background: #fff; color: #666; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 0.9rem; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-secondary:hover { background: #f7f7f5; }
    </style>
</head>
<body>
<header>
    <a th:href="@{/trabajos}" class="brand">ENTREGA <span>YA</span></a>
    <span class="header-sub">Nuevo trabajo</span>
</header>
<div class="container">
    <a th:href="@{/trabajos}" class="back">← Volver</a>
    <div class="card">
        <div class="card-title">Crear nuevo trabajo</div>
        <form th:action="@{/trabajos/nuevo}" th:object="${trabajo}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field">
                <label>Nombre *</label>
                <input type="text" th:field="*{nombreTrabajo}" placeholder="Ej. Informe de Estructuras de Datos" required/>
            </div>
            <div class="field">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}" placeholder="Describe brevemente el trabajo..."></textarea>
            </div>
            <div class="row">
                <div class="field">
                    <label>Fecha inicio</label>
                    <input type="datetime-local" th:field="*{fechaInicio}"/>
                </div>
                <div class="field">
                    <label>Fecha entrega</label>
                    <input type="datetime-local" th:field="*{fechaEntrega}"/>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn-primary">Crear trabajo</button>
                <a th:href="@{/trabajos}" class="btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
