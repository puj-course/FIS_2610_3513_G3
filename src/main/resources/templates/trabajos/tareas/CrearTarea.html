<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Entrega Ya — Nueva Tarea</title>
    <th:block th:replace="~{fragments/form-styles :: formStyles}"></th:block>
    <style>
        /* Estilos adicionales exclusivos de CrearTarea */
        input[type="text"], textarea, input[type="datetime-local"], select {
            width: 100%; padding: 10px 12px; border: 1px solid #e5e5e5; border-radius: 6px;
            font-size: 0.9rem; font-family: inherit; outline: none; background: #fafafa;
        }
        select:focus { border-color: #f4a535; background: #fff; }

        /* Responsables check-list */
        .check-group { display: flex; flex-direction: column; gap: 6px; }
        .check-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1px solid #eee; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
        .check-item:hover { background: #fdf6ec; border-color: #f4a535; }
        .check-item input[type="checkbox"] { width: 15px; height: 15px; accent-color: #f4a535; }
        .check-item label { font-size: 0.88rem; cursor: pointer; }
        .no-colabs { font-size: 0.82rem; color: #aaa; padding: 8px 0; }
        .field-label { display: block; font-size: 0.78rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .btn-primary { color: #1a1a1a; }
    </style>
</head>
<body>
<header>
    <a th:href="@{/trabajos}" class="brand">ENTREGA <span>YA</span></a>
    <span class="header-sub">Nueva tarea</span>
</header>
<div class="container">
    <a th:href="@{/trabajos/{id}(id=${trabajoId})}" class="back">← Volver al trabajo</a>
    <div class="card">
        <div class="card-title">Crear nueva tarea</div>
        <form th:action="@{/trabajos/{id}/tareas/nueva(id=${trabajoId})}" th:object="${tarea}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="field">
                <label class="field-label" for="nombre">Nombre *</label>
                <input type="text" th:field="*{nombre}" placeholder="Ej. Redactar introducción" required/>
            </div>

            <div class="field">
                <label class="field-label" for="descripcion">Descripción</label>
                <textarea th:field="*{descripcion}" placeholder="Describe brevemente la tarea..."></textarea>
            </div>

            <div class="row">
                <div class="field">
                    <label class="field-label" for="fechaInicio">Fecha inicio</label>
                    <input type="datetime-local" th:field="*{fechaInicio}"/>
                </div>
                <div class="field">
                    <label class="field-label" for="fechaFinal">Fecha límite</label>
                    <input type="datetime-local" th:field="*{fechaFinal}"/>
                </div>
            </div>

            <div class="field">
                <label class="field-label" for="dificultad">Dificultad</label>
                <select th:field="*{dificultad}">
                    <option th:each="d : ${dificultades}" th:value="${d}" th:text="${d.name()}"></option>
                </select>
            </div>

            <div class="field">
                <span class="field-label">Responsables</span>
                <div class="check-group" th:if="${not #sets.isEmpty(colaboradores)}">
                    <span class="check-item" th:each="col : ${colaboradores}">
                        <input type="checkbox" name="responsableIds" th:value="${col.id}"/>
                        <span th:text="${col.username}"></span>
                    </span>
                </div>
                <p class="no-colabs" th:if="${#sets.isEmpty(colaboradores)}">
                    Este trabajo aún no tiene colaboradores. Invítalos desde la vista de detalle.
                </p>
            </div>

            <div class="actions">
                <button type="submit" class="btn-primary">Crear tarea</button>
                <a th:href="@{/trabajos/{id}(id=${trabajoId})}" class="btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
</body>
</html>
