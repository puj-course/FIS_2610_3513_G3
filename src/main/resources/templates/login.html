<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Entrega Ya — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f7f7f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 32px; width: 100%; max-width: 380px; }
        .brand { font-size: 1.3rem; font-weight: 800; color: #1a1a1a; margin-bottom: 24px; }
        .brand span { color: #f4a535; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 0.9rem; outline: none; margin-bottom: 14px; }
        input:focus { border-color: #f4a535; }
        .btn { width: 100%; padding: 11px; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
        .btn-primary { background: #f4a535; color: #fff; }
        .btn-primary:hover { background: #e0932b; }
        .btn-secondary { background: #fff; color: #444; border: 1px solid #e5e5e5; }
        .btn-secondary:hover { background: #f7f7f5; }
        .msg { padding: 9px 12px; border-radius: 6px; font-size: 0.82rem; margin-bottom: 14px; }
        .msg-error   { background: #fff1f0; color: #c0392b; border: 1px solid #fdd; }
        .msg-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .divider { text-align: center; font-size: 0.8rem; color: #bbb; margin: 10px 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">ENTREGA <span>YA</span></div>

    <div class="msg msg-error"   th:if="${param.error}">Usuario o contraseña incorrectos.</div>
    <div class="msg msg-success" th:if="${param.logout}">Sesión cerrada.</div>
    <div class="msg msg-success" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Usuario</label>
        <input type="text" name="username" placeholder="tu_usuario" required/>
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required/>
        <button type="submit" class="btn btn-primary">Iniciar sesión</button>
    </form>
    <div class="divider">o</div>
    <button class="btn btn-secondary" onclick="location.href='/register'">Crear cuenta</button>
</div>
</body>
</html>
