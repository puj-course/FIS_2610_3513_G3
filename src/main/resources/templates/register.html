<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Entrega Ya — Registro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f7f7f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 32px; width: 100%; max-width: 380px; }
        .brand { font-size: 1.3rem; font-weight: 800; color: #1a1a1a; margin-bottom: 6px; }
        .brand span { color: #f4a535; }
        .subtitle { font-size: 0.82rem; color: #888; margin-bottom: 24px; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 0.9rem; outline: none; margin-bottom: 14px; }
        input:focus { border-color: #f4a535; }
        .btn { width: 100%; padding: 11px; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
        .btn-primary { background: #f4a535; color: #fff; }
        .btn-primary:hover { background: #e0932b; }
        .btn-secondary { background: #fff; color: #444; border: 1px solid #e5e5e5; }
        .btn-secondary:hover { background: #f7f7f5; }
        .msg-error { padding: 9px 12px; border-radius: 6px; font-size: 0.82rem; margin-bottom: 14px; background: #fff1f0; color: #c0392b; border: 1px solid #fdd; }
        .divider { text-align: center; font-size: 0.8rem; color: #bbb; margin: 10px 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">ENTREGA <span>YA</span></div>
    <div class="subtitle">Crea tu cuenta para comenzar</div>

    <div class="msg-error" th:if="${error}" th:text="${error}"></div>
    <div style="padding:9px 12px;border-radius:6px;font-size:0.82rem;margin-bottom:14px;background:#f0fff4;color:#1a7a3a;border:1px solid #a8d8b0;" th:if="${success}" th:text="${success}"></div>

    <form th:action="@{/register}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Usuario</label>
        <input type="text" name="username" placeholder="mi_usuario" required minlength="3"/>
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6"/>
        <label>Correo electrónico</label>
        <input type="email" name="email" placeholder="ejemplo@correo.com" required/>
        <button type="submit" class="btn btn-primary">Registrarme</button>
    </form>
    <div class="divider">¿Ya tienes cuenta?</div>
    <button class="btn btn-secondary" onclick="location.href='/login'">← Volver al login</button>
</div>
</body>
</html>
