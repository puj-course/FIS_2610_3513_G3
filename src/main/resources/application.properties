spring.application.name=entregaya

# Config database - usa variables de entorno en Docker, localhost en desarrollo local
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:entregaya}
spring.datasource.username=${DB_USER:entregaya_user}
spring.datasource.password=${DB_PASSWORD:tu_password_real}
spring.datasource.driver-class-name=org.postgresql.Driver

# config jpa
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ddl-auto=update permite que Hibernate agregue las columnas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

logging.level.org.springframework.web.servlet=TRACE
logging.level.org.thymeleaf=DEBUG
logging.level.org.hibernate.LazyInitializationException=DEBUG
logging.level.root=INFO

# microservicio telegram
telegram.bot.token=${TELEGRAM_BOT_TOKEN:SIN_CONFIGURAR}
telegram.api.url=https://api.telegram.org
